services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: scent
      POSTGRES_USER: scent
      POSTGRES_PASSWORD: scent_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/00_init.sql
      - ./infra/postgres/seed.sql:/docker-entrypoint-initdb.d/01_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scent"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  scent-server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    environment:
      DATABASE_URL: postgresql://scent:scent_dev@postgres:5432/scent
      REDIS_URL: redis://redis:6379
      PORT: "3000"
      OTEL_SERVICE_NAME: scent-server
      OTEL_SERVICE_VERSION: "0.0.1"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  scent-observatory:
    build:
      context: .
      dockerfile: apps/observatory/Dockerfile
      args:
        VITE_API_BASE: http://localhost:3000
        VITE_API_KEY: demo-api-key-dev
    ports:
      - "4000:80"
    depends_on:
      - scent-server

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./infra/otel-collector.yaml:/etc/otel-collector.yaml
    ports:
      - "4318:4318"
    depends_on:
      - tempo

  tempo:
    image: grafana/tempo:latest
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./infra/tempo.yaml:/etc/tempo.yaml
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    ports:
      - "3100:3000"
    depends_on:
      - tempo

volumes:
  postgres-data:
  redis-data:
  tempo-data:
  grafana-data:
