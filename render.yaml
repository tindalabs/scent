# Render Blueprint for the Scent hosted backend.
#
# Four resources in Frankfurt, all sharing one managed Postgres + one managed
# Key Value (Redis):
#   - scent-server  (Web Service)        — ingest + query API; runs migrations on boot
#   - scent-worker  (Background Worker)  — drains the BullMQ ingest queue
#   - scent-postgres (PostgreSQL)        — identity graph, snapshots, drift, risk
#   - scent-redis    (Key Value / Redis) — API-key cache, rate limiter, ingest queue
#
# Both services build from the SAME image (packages/server/Dockerfile, repo-root
# context); only the start command differs. The web service owns the schema —
# index.ts runs migrate() on startup; the worker deliberately does not.
#
# First deploy: `render blueprint launch` (or connect the repo in the dashboard).
# Plans below are conservative starting points — adjust in the dashboard as load
# grows. Verify plan slugs against your Render account before launch.

databases:
  - name: scent-postgres
    region: frankfurt
    plan: basic-256mb
    postgresMajorVersion: "16" # bit_count() used by the SimHash blocking index needs PG14+

services:
  # ---- Redis / Key Value -------------------------------------------------------
  # Backs three things; the ingest queue is the one with hard requirements:
  #   - maxmemoryPolicy MUST be noeviction — BullMQ cannot tolerate evicted keys.
  #   - Use a plan with persistence so enqueued-but-unprocessed jobs survive a
  #     restart (at-least-once relies on this + the event_id dedupe in the worker).
  - type: redis
    name: scent-redis
    region: frankfurt
    plan: starter
    maxmemoryPolicy: noeviction
    ipAllowList: [] # empty = reachable only from other Render services in this account

  # ---- Web Service: ingest + query API ----------------------------------------
  - type: web
    name: scent-server
    runtime: docker
    region: frankfurt
    plan: starter
    dockerfilePath: packages/server/Dockerfile
    dockerContext: . # Dockerfile COPYs pnpm-lock.yaml / workspace from repo root
    healthCheckPath: /health
    # No dockerCommand override: the Dockerfile CMD runs the server
    # (node --import ./dist/tracing.js dist/index.js), which migrate()s then listens.
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: scent-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: scent-redis
          type: redis
          property: connectionString
      # PORT is injected by Render; index.ts reads process.env.PORT.
      - key: NODE_ENV
        value: production
      - key: OTEL_SERVICE_NAME
        value: scent-server
      - key: OTEL_SERVICE_VERSION
        value: "0.0.1"
      # No OTLP collector in this topology yet — disable the exporter so startup
      # doesn't block retrying a dead endpoint. Flip to false and set
      # OTEL_EXPORTER_OTLP_ENDPOINT once a hosted Tempo/collector exists.
      - key: OTEL_SDK_DISABLED
        value: "true"

  # ---- Background Worker: drains the ingest queue ------------------------------
  - type: worker
    name: scent-worker
    runtime: docker
    region: frankfurt
    plan: starter
    dockerfilePath: packages/server/Dockerfile
    dockerContext: .
    # Same image, different entrypoint: run the BullMQ worker instead of the server.
    # WORKDIR is /app/packages/server (set in the Dockerfile), so this matches the
    # package's "worker:start" script.
    dockerCommand: node --import ./dist/tracing.js dist/worker.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: scent-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: scent-redis
          type: redis
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: OTEL_SERVICE_NAME
        value: scent-worker
      - key: OTEL_SERVICE_VERSION
        value: "0.0.1"
      - key: OTEL_SDK_DISABLED
        value: "true"
      # Bound concurrency so a burst can't exhaust the Postgres pool (client.ts max: 10).
      - key: WORKER_CONCURRENCY
        value: "5"
