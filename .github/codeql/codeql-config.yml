name: "Scent CodeQL config"

# Broadest pack — extra coverage is worth the noise for a project this size.
queries:
  - uses: security-and-quality

# This is the ONLY exclusion, scoped to a single 7-line file, purely to silence one
# false positive. js/insufficient-password-hash flags the SHA-256 hashing of the
# project API key in middleware/api-key.ts as if it were a password. API keys are
# 256-bit random tokens (crypto.randomBytes), NOT passwords: a fast hash is the
# correct, industry-standard choice (O(1) lookup, no rainbow-table/brute-force risk),
# and a slow salted KDF would add no security.
#
# The query stays ACTIVE everywhere else. Future password-based auth — e.g. Observatory
# login and API-key rotation — lives in other files and MUST use a slow salted KDF
# (bcrypt/scrypt/argon2); it will still be analyzed and flagged by this rule. Do not
# broaden this exclusion to a whole-repo query filter.
paths-ignore:
  - packages/server/src/middleware/api-key.ts

query-filters:
  # These two queries only recognize a handful of specific libraries and cannot see
  # this codebase's deliberate, equivalent (arguably better) implementations — so
  # they false-positive on correct code and carry little signal here. Unlike the
  # password-hash query (kept active, since it WOULD catch a real future fast-hash),
  # these can't distinguish protected from unprotected routes at all.
  #
  # - missing-rate-limiting: every /v1 and /admin route IS rate-limited, via a shared
  #   Redis fixed-window limiter mounted on the router (middleware/rate-limit.ts) —
  #   cross-instance, unlike express-rate-limit's default in-memory store. CodeQL only
  #   recognizes named libraries, so it flags the custom limiter (including on /v1).
  # - missing-token-validation: the cookie-authenticated /admin API uses a SameSite=Lax
  #   session cookie plus a double-submit CSRF token (admin/csrf.ts, requireCsrf on all
  #   mutations). The /v1 data API uses header auth (X-Api-Key), which isn't CSRF-able.
  - exclude:
      id: js/missing-rate-limiting
  - exclude:
      id: js/missing-token-validation
