name: CodeQL

# GitHub's CodeQL SAST analysis. For an identity/fingerprinting SDK that ships
# into other people's browsers and handles linkage between anonymous identities
# and real account IDs, "we run SAST" is table stakes for downstream due
# diligence. Free on public repos; findings appear in the Security tab.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 06:00 UTC — catches new CodeQL rule releases without
    # waiting for the next PR.
    - cron: '0 6 * * 1'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # Query pack (security-and-quality) + the single scoped paths-ignore for
          # the API-key hash false positive live in the config file.
          config-file: ./.github/codeql/codeql-config.yml

      # JS/TS needs no build — CodeQL analyzes the source directly.
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{ matrix.language }}'
