name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.4

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
          # Configures the registry in .npmrc. With Trusted Publishing we do NOT
          # set NODE_AUTH_TOKEN — npm uses the GitHub OIDC token instead.
          registry-url: https://registry.npmjs.org

      # Trusted Publishing (OIDC, no NPM_TOKEN) requires npm >= 11.5.1.
      # Node 22's bundled npm is older, so upgrade the npm that
      # `changeset publish` shells out to.
      - name: Upgrade npm for Trusted Publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      # Publishing uses npm Trusted Publishing (OIDC) — no NPM_TOKEN secret.
      # Each public package must have a trusted publisher configured on npmjs.com
      # (package → Settings → Trusted Publisher: repo tindalabs/scent,
      # workflow release.yml). GITHUB_TOKEN (auto-provided) is still needed for
      # the "Version Packages" PR. NPM_CONFIG_PROVENANCE emits provenance
      # attestation, signed via the same OIDC id-token.
      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      # Publish the scent-server Docker image to GHCR and Docker Hub on each main push.
      # The image is tagged with the commit SHA and "latest"; GitHub OIDC provides auth
      # to GHCR (no secret needed). Docker Hub requires DOCKERHUB_USERNAME + DOCKERHUB_TOKEN
      # (configure in repo Settings → Secrets).
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}

      - name: Build and push scent-server to registries
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/scent-server:latest
            ghcr.io/${{ github.repository_owner }}/scent-server:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/scent-server:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/scent-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          skip-docker-push-step: ${{ secrets.DOCKERHUB_USERNAME == '' || secrets.DOCKERHUB_TOKEN == '' }}
