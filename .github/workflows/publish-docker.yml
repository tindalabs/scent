name: Publish Docker Image

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    # The secrets context is NOT available in step-level `if:` conditions, so hoist
    # the Docker Hub username into a job-level env var (env IS available in `if:`).
    # This lets the Docker Hub steps skip cleanly when the secret isn't configured,
    # while GHCR always publishes via the built-in GITHUB_TOKEN (OIDC).
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GHCR
        uses: docker/build-push-action@v7
        with:
          context: .
          file: packages/server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/scent-server:latest
            ghcr.io/${{ github.repository_owner }}/scent-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Log in to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: packages/server/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/scent-server:latest
            ${{ env.DOCKERHUB_USERNAME }}/scent-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Keep the Docker Hub repository "About" box in sync with the source of truth
      # (packages/server/DOCKERHUB.md) on every push to main, so it can't drift.
      # DOCKERHUB_TOKEN must be a PAT with permission to edit the repo description
      # (the image-push scope alone returns 403 here); the step is skipped when the
      # Docker Hub secrets aren't configured, like the push steps above.
      # Best-effort: a failed/forbidden description sync must never fail the image
      # publish, so it's marked continue-on-error (shows as a warning, not a failure).
      - name: Sync Docker Hub description
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        continue-on-error: true
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKERHUB_USERNAME }}/scent-server
          readme-filepath: packages/server/DOCKERHUB.md
          short-description: "Probabilistic identity continuity & fraud-signal server - drift-tolerant, self-hostable."
