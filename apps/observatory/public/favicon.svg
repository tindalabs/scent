<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="7" fill="#0b0f0e"/>
  <!-- A small identity graph: one anchor identity linked to its candidate matches —
       what Scent actually does (probabilistic linkage / clustering). -->
  <g stroke="#34d399" stroke-width="1.6" opacity="0.55">
    <line x1="16" y1="16" x2="8" y2="8"/>
    <line x1="16" y1="16" x2="25" y2="11"/>
    <line x1="16" y1="16" x2="11" y2="24"/>
  </g>
  <g fill="#34d399">
    <circle cx="8" cy="8" r="2.4"/>
    <circle cx="25" cy="11" r="2.4"/>
    <circle cx="11" cy="24" r="2.4"/>
  </g>
  <circle cx="16" cy="16" r="3.6" fill="#6ee7b7"/>
</svg>
